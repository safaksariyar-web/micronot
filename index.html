<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroNot — Lock Screen Tasks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #080808;
color: #ffffff;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
padding: 40px 24px;
position: relative;
overflow: hidden;
}

body::before {
content: ‘’;
position: fixed;
width: 500px;
height: 500px;
background: radial-gradient(circle, rgba(0,230,118,0.12) 0%, transparent 70%);
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
pointer-events: none;
}

.icon {
width: 120px;
height: 120px;
margin: 0 auto 32px;
animation: float 3s ease-in-out infinite;
filter: drop-shadow(0 0 30px rgba(0,230,118,0.6));
}

@keyframes float {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-12px); }
}

h1 {
font-size: 38px;
font-weight: 800;
line-height: 1.15;
margin-bottom: 16px;
letter-spacing: -0.5px;
}

h1 span { color: #00e676; }

p {
font-size: 17px;
color: #666;
line-height: 1.6;
max-width: 320px;
margin: 0 auto 48px;
}

.btn {
display: inline-block;
background: #00e676;
color: #000000;
font-size: 17px;
font-weight: 700;
padding: 18px 48px;
border-radius: 100px;
text-decoration: none;
transition: all 0.2s;
box-shadow: 0 0 40px rgba(0,230,118,0.3);
}

.btn:hover {
transform: scale(1.04);
box-shadow: 0 0 60px rgba(0,230,118,0.5);
}

.store-label {
margin-top: 14px;
font-size: 13px;
color: #333;
letter-spacing: 0.5px;
}

.prices {
margin-top: 48px;
display: flex;
gap: 32px;
justify-content: center;
flex-wrap: wrap;
}

.price { text-align: center; }

.price .amount {
font-size: 20px;
font-weight: 700;
color: #00e676;
}

.price .label {
font-size: 11px;
color: #333;
letter-spacing: 1.5px;
margin-top: 4px;
}

.divider {
width: 1px;
background: #1a1a1a;
align-self: stretch;
}
</style>

</head>
<body>

  <svg class="icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="58" fill="#111" stroke="#00e676" stroke-width="2.5"/>
    <rect x="32" y="54" width="56" height="42" rx="8" fill="#00e676"/>
    <path d="M42 54V42C42 30.95 50.95 22 62 22C73.05 22 82 30.95 82 42V54" stroke="#00e676" stroke-width="8" stroke-linecap="round" fill="none"/>
    <circle cx="60" cy="72" r="7" fill="#080808"/>
    <rect x="56" y="76" width="8" height="12" rx="4" fill="#080808"/>
  </svg>

  <h1>Capture tasks from<br>your <span>lock screen.</span></h1>
  <p>No unlock needed. Voice or text. Your thoughts captured instantly before they disappear.</p>

<a href="https://play.google.com/store/apps/details?id=com.sariyar.micronot" class="btn">↓ Free Download</a>

  <div class="store-label">Google Play Store</div>

  <div class="prices">
    <div class="price">
      <div class="amount">Free</div>
      <div class="label">FOREVER</div>
    </div>
    <div class="divider"></div>
    <div class="price">
      <div class="amount">$2.99</div>
      <div class="label">PER MONTH</div>
    </div>
    <div class="divider"></div>
    <div class="price">
      <div class="amount">$29.99</div>
      <div class="label">LIFETIME</div>
    </div>
  </div>

</body>
</html>
